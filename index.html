<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penghisap Html</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght=400;600&family=Space+Grotesk:wght=400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #020106;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Fullscreen Interactive Canvas */
        #spaceCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* Ambient Space Fog */
        .space-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, transparent 20%, rgba(2, 1, 6, 0.6) 80%, #020106 100%);
        }

        /* Main Center Layout Wrapper */
        .main-wrapper {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 30px 20px;
        }

        /* Initial Sucking Glass Card */
        .extractor-card {
            width: 100%;
            max-width: 440px;
            background: rgba(10, 6, 22, 0.72);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 240, 255, 0.18);
            border-radius: 24px;
            padding: 25px 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8),
                        inset 0 1px 2px rgba(255, 255, 255, 0.1);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform: scale(1);
            opacity: 1;
            margin-bottom: 20px;
        }

        .extractor-card.hidden {
            transform: scale(0.8) translateY(-50px);
            opacity: 0;
            pointer-events: none;
            display: none;
        }

        /* Logo and Header text */
        .logo-group {
            margin-bottom: 20px;
        }

        .logo-group h1 {
            font-size: 2.2em;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #00f0ff, #ff0077, #ffbb00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
            text-shadow: 0 0 35px rgba(0, 240, 255, 0.3);
        }

        .logo-group .subtitle {
            font-size: 10px;
            color: #8fa0dd;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 700;
        }

        /* Field Groups */
        .field-group {
            text-align: left;
        }

        .field-label {
            font-size: 10px;
            color: #8ea1c9;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            display: block;
            font-weight: 600;
        }

        .input-box {
            position: relative;
            margin-bottom: 12px;
        }

        .input-box svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: #00f0ff;
            opacity: 0.6;
        }

        input[type="url"] {
            width: 100%;
            padding: 12px 12px 12px 42px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 13.5px;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }

        input[type="url"]:focus {
            border-color: #00f0ff;
            background: rgba(0, 0, 0, 0.85);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        /* Hisap Kode Action Button */
        .suck-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #00f0ff, #0055ff);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 13.5px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 5px 20px rgba(0, 85, 255, 0.45);
        }

        .suck-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 240, 255, 0.5);
            background: linear-gradient(135deg, #00f0ff, #ff0055);
        }

        .suck-btn:active {
            transform: translateY(1px);
        }

        /* Loading Tracker */
        .cosmic-loader {
            display: none;
            text-align: center;
            padding: 15px 0 5px;
        }

        .cosmic-loader.active {
            display: block;
        }

        .pulsing-ring {
            display: inline-block;
            position: relative;
            width: 40px;
            height: 40px;
        }

        .pulsing-ring div {
            box-sizing: border-box;
            display: block;
            position: absolute;
            width: 32px;
            height: 32px;
            margin: 4px;
            border: 3px solid transparent;
            border-radius: 50%;
            animation: spin-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        .pulsing-ring div:nth-child(1) { border-top-color: #00f0ff; animation-delay: -0.45s; }
        .pulsing-ring div:nth-child(2) { border-top-color: #ff0077; animation-delay: -0.3s; }
        .pulsing-ring div:nth-child(3) { border-top-color: #ffcc00; animation-delay: -0.15s; }

        @keyframes spin-ring {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-status {
            margin-top: 8px;
            font-size: 12px;
            color: #a0a5c0;
            animation: pulse-text 1.5s infinite;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* FULL OVERLAY TERMINAL PANEL */
        .terminal-overlay {
            position: absolute;
            width: 100%;
            max-width: 920px;
            background: rgba(8, 4, 18, 0.88);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 240, 255, 0.22);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.95),
                        0 0 40px rgba(255, 0, 85, 0.15);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 80px);
            max-height: 720px;
            opacity: 0;
            transform: scale(0.9) translateY(40px);
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 20;
            margin-top: auto;
            margin-bottom: auto;
        }

        .terminal-overlay.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        /* Cosmic Victory Announcement Badge */
        .victory-banner {
            background: rgba(255, 0, 119, 0.12);
            border: 1px dashed rgba(255, 0, 119, 0.4);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin-bottom: 15px;
            color: #ff3385;
            font-weight: 700;
            font-size: 13.5px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            animation: pulse-border 2s infinite alternate;
        }

        @keyframes pulse-border {
            from { border-color: rgba(255, 0, 119, 0.4); box-shadow: 0 0 5px rgba(255, 0, 119, 0.1); }
            to { border-color: rgba(0, 240, 255, 0.6); box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); }
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .badges-group {
            display: flex;
            gap: 8px;
        }

        .terminal-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #a0a5c0;
            font-weight: 600;
        }

        .terminal-badge.creator {
            border-color: rgba(0, 240, 255, 0.3);
            background: rgba(0, 240, 255, 0.05);
            color: #00f0ff;
        }

        .terminal-badge.success {
            border-color: rgba(0, 255, 120, 0.2);
            background: rgba(0, 255, 120, 0.05);
            color: #00ff78;
        }

        /* Code & Preview Viewer Container */
        .terminal-window {
            flex: 1;
            background: #010003;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .window-bar {
            height: 42px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            padding: 0 16px;
            justify-content: space-between;
        }

        .window-dots {
            display: flex;
            gap: 6px;
        }

        .window-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .window-dot.red { background: #ff5f56; }
        .window-dot.yellow { background: #ffbd2e; }
        .window-dot.green { background: #27c93f; }

        /* Navigation Tabs in Terminal Bar */
        .terminal-tabs {
            display: flex;
            gap: 4px;
            background: rgba(0, 0, 0, 0.4);
            padding: 3px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #8fa0dd;
            font-family: inherit;
            font-size: 11.5px;
            font-weight: 600;
            padding: 6px 14px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
        }

        .tab-btn.active {
            color: #fff;
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(0, 85, 255, 0.2));
            border: 1px solid rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }

        .window-title {
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            color: #555768;
        }

        /* Screen Sections */
        .content-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .code-area {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: block; /* Default visible */
        }

        .code-output {
            font-family: 'Fira Code', monospace;
            font-size: 12.5px;
            line-height: 1.6;
            color: #cbd5e1;
            white-space: pre;
        }

        /* Preview Area */
        .preview-area {
            flex: 1;
            display: none; /* Default hidden */
            background: #fff;
            border: none;
            width: 100%;
            height: 100%;
        }

        #liveFrame {
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
        }

        /* Syntax coloring rules */
        .tag { color: #ff2a74 !important; font-weight: 600; }
        .attr { color: #ffaa00 !important; }
        .val { color: #00ffaa !important; }
        .comment { color: #6a737d !important; font-style: italic; }

        /* Terminal Actions */
        .actions-row {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .terminal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
        }

        .terminal-btn.copy {
            background: rgba(0, 240, 255, 0.06);
            border: 1px solid rgba(0, 240, 255, 0.25);
            color: #00f0ff;
        }

        .terminal-btn.copy:hover {
            background: #00f0ff;
            color: #020005;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .terminal-btn.copy.copied {
            background: rgba(0, 255, 120, 0.15);
            border-color: #00ff78;
            color: #00ff78;
            box-shadow: 0 0 15px rgba(0, 255, 120, 0.2);
        }

        .terminal-btn.reset {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #d1d5db;
        }

        .terminal-btn.reset:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        /* Toast Popup Alerts */
        .toast-box {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-width: 320px;
        }

        .toast {
            background: rgba(8, 4, 18, 0.95);
            border-left: 4px solid #ff0055;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 12px 16px;
            border-radius: 6px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            color: #fff;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.15);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            border-left-color: #00ff78;
        }

        .toast svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }

        /* Scrollbars */
        .code-area::-webkit-scrollbar {
            width: 5px;
        }
        .code-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .code-area::-webkit-scrollbar-thumb {
            background: rgba(0, 240, 255, 0.15);
            border-radius: 3px;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .terminal-overlay {
                height: calc(100vh - 40px);
                max-height: 90%;
                padding: 15px;
            }
            .logo-group h1 {
                font-size: 2.1em;
            }
            .victory-banner {
                font-size: 11px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Space Simulation Engine -->
    <canvas id="spaceCanvas"></canvas>
    <div class="space-overlay"></div>

    <!-- Active Floating Interactive Layout -->
    <div class="main-wrapper">
        
        <!-- Welcome & Input Glass Card -->
        <div class="extractor-card" id="inputCard">
            <div class="logo-group">
                <h1>Penghisap Html</h1>
                <div class="subtitle">Cosmic Code Extractor</div>
            </div>

            <div class="field-group">
                <span class="field-label">Target Singularitas</span>
                <div class="input-box">
                    <input type="url" id="urlInput" placeholder="Masukkan URL (Wajib https://)" required autocomplete="off">
                    <svg viewBox="0 0 24 24">
                        <path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/>
                    </svg>
                </div>
                <button class="suck-btn" onclick="generateCode()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
                    </svg>
                    Hisap Kode
                </button>

                <!-- Cosmic Loading Status -->
                <div class="cosmic-loader" id="loaderBox">
                    <div class="pulsing-ring">
                        <div></div>
                        <div></div>
                        <div></div>
                    </div>
                    <div class="loader-status" id="loaderText">Menyelaraskan gravitasi Black Hole...</div>
                </div>
            </div>
        </div>

        <!-- FULL TERMINAL RESULTS DISPLAY (Nutupin elemen di atas ketika siap) -->
        <div class="terminal-overlay" id="terminalOverlay">
            
            <!-- Cosmic Sucking Success Announcement -->
            <div class="victory-banner">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z" />
                </svg>
                <span>Scorpio dan Orion berhasil dihisap Black Hole!</span>
            </div>

            <div class="terminal-header">
                <div class="badges-group">
                    <div class="terminal-badge creator">Creator: 𝙰𝚗𝚐𝚉𝚉𝙽𝚘𝚝𝙳𝚎𝚟</div>
                    <div class="terminal-badge success" id="statusBadge">Status: Berhasil</div>
                </div>
                <div class="window-title" id="previewUrlTitle">extracted_source.html</div>
            </div>

            <div class="terminal-window">
                <div class="window-bar">
                    <div class="window-dots">
                        <span class="window-dot red"></span>
                        <span class="window-dot yellow"></span>
                        <span class="window-dot green"></span>
                    </div>
                    
                    <!-- Tab Switcher -->
                    <div class="terminal-tabs">
                        <button class="tab-btn active" id="btnCodeTab" onclick="switchTerminalTab('code')">
                            📄 Kode Sumber (Beautified)
                        </button>
                        <button class="tab-btn" id="btnPreviewTab" onclick="switchTerminalTab('preview')">
                            🌐 Tampilan Live (Interaktif)
                        </button>
                    </div>
                    
                    <div style="width:30px"></div>
                </div>
                
                <div class="content-container">
                    <!-- Code View Tab -->
                    <div class="code-area" id="codeTabContent">
                        <pre class="code-output" id="codeOutput"></pre>
                    </div>
                    
                    <!-- Web Frame Preview Tab -->
                    <div class="preview-area" id="previewTabContent">
                        <iframe id="liveFrame" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
                    </div>
                </div>
            </div>

            <div class="actions-row">
                <button class="terminal-btn copy" id="copyBtn" onclick="copyCode()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0-2-.9-2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                    </svg>
                    Salin Kode
                </button>
                <button class="terminal-btn reset" onclick="resetApp()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
                    </svg>
                    Hisap Lagi
                </button>
            </div>
        </div>
    </div>

    <!-- Toast box alerts -->
    <div class="toast-box" id="toastContainer"></div>

    <script>
        /* === Toast System === */
        function showToast(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'success' ? 'success' : ''}`;
            
            const errIcon = `<svg fill="currentColor" viewBox="0 0 20 20"><path d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"/></svg>`;
            const succIcon = `<svg fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"/></svg>`;
            
            toast.innerHTML = `${type === 'success' ? succIcon : errIcon}<span>${message}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 50);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        /* === Space Canvas Simulation === */
        const canvas = document.getElementById('spaceCanvas');
        const ctx = canvas.getContext('2d');

        let stars = [];
        let blackHole;
        let orion;
        let scorpius;
        let codeParticles = [];
        let isGlobalSucking = false; 

        let rawFetchedHTML = ""; // Menyimpan original HTML string

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initUniverse();
        }

        function initUniverse() {
            blackHole = new BlackHole();
            orion = new Orion();
            scorpius = new Scorpius();

            stars = [];
            for (let i = 0; i < 180; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5 + 0.4,
                    opacity: Math.random() * 0.7 + 0.3,
                    speed: Math.random() * 0.006 + 0.002,
                    twinkle: Math.random() * Math.PI

        /* === Letusan Partikel HTML dengan Fisika Tarikan Black Hole Magnetis === */
        function generateCodeParticle() {
            const tags = ['<html>', '<div>', '<p>', 'CSS', 'JS', '<span>', '<h1>', 'src', 'href', 'class', 'id', '<a>'];
            const chosen = tags[Math.floor(Math.random() * tags.length)];

            const dy = blackHole.y - startY;
            const baseAngle = Math.atan2(dy, dx);

            const angle = baseAngle + (Math.random() - 0.5) * 1.5; 
            const speed = Math.random() * 8 + 4; 

            codeParticles.push({
                x: startX + (Math.random() - 0.5) * 50,
                y: startY + rect.height / 3,
                text: chosen,
                color: Math.random() > 0.5 ? '#ff00aa' : '#00f0ff',
                fontSize: Math.floor(Math.random() * 5) + 11,
                opacity: 1,
                vx: Math.cos(angle) * speed,

            });
        }

        function runMainLoop() {
            ctx.fillStyle = 'rgba(2, 1, 6, 0.22)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            stars.forEach(star => {
                star.twinkle += star.speed;
                const liveOpacity = star.opacity + Math.sin(star.twinkle) * 0.25;

                const dx = star.x - blackHole.x;
                const dy = star.y - blackHole.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                let rx = star.x;
                let ry = star.y;

                if (dist < 340 && dist > blackHole.eventHorizon) {
                    const shear = (340 - dist) * 0.16;
                    const angle = Math.atan2(dy, dx);
                    rx += Math.cos(angle + 0.12) * shear;
                    ry += Math.sin(angle + 0.12) * shear;
                }

                ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, Math.min(1, liveOpacity))})`;
                ctx.beginPath();
                ctx.arc(rx, ry, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            blackHole.drawBack();
            blackHole.drawSingularity();
            blackHole.drawFront();

            orion.draw();
            scorpius.draw();

            // Loop Partikel dengan kalkulasi tarikan vortex
            codeParticles.forEach((tag, idx) => {
                const dx = blackHole.x - tag.x;
                const dy = blackHole.y - tag.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < blackHole.eventHorizon + 8) {
                    codeParticles.splice(idx, 1);
                    return;
                }

                const pullForce = 0.24 + (120 / dist); 
                tag.vx += (dx / dist) * pullForce;
                tag.vy += (dy / dist) * pullForce;

                const swirlStrength = Math.min(3.5, 220 / dist);
                const perpX = -dy / dist;
                const perpY = dx / dist;
                tag.vx += perpX * swirlStrength;
                tag.vy += perpY * swirlStrength;

                tag.vx *= 0.93;
                tag.vy *= 0.93;

                tag.x += tag.vx;
                tag.y += tag.vy;

                tag.opacity = Math.max(0, Math.min(1, dist / 180));

                ctx.font = `600 ${tag.fontSize}px 'Fira Code'`;
                ctx.fillStyle = tag.color === '#00f0ff' ? `rgba(0, 240, 255, ${tag.opacity})` : `rgba(255, 0, 119, ${tag.opacity})`;
                ctx.fillText(tag.text, tag.x, tag.y);
            });

            requestAnimationFrame(runMainLoop);
        }

        /* === HTML Code Beautifier === */
        function beautifyHTML(html) {
            let result = '';
            let indent = '';
            const tab = '    '; 
            
            const cleanHtml = html.replace(/\s*<\s*/g, '<').replace(/\s*>\s*/g, '>');
            const elements = cleanHtml.split(/>\s*</);
            
            elements.forEach((element, index) => {
                let current = element;
                if (index > 0) current = '<' + current;
                if (index < elements.length - 1) current = current + '>';
                
                if (current.match(/^<\/\w/)) {
                    indent = indent.substring(tab.length);
                }
                
                result += indent + current + '\n';
                
                if (current.match(/^<\w[^>]*[^\/]>$/) && 
                    !current.startsWith('<!') && 
                    !current.match(/^<(img|input|br|hr|link|meta|source|col|embed|area)/i)) {
                    indent += tab;
                }
            });
            
            return result.trim();
        }

        /* === Dynamic Base-URL Tag Injector === */
        function injectBaseHref(html, originalUrl) {
            try {
                const urlObj = new URL(originalUrl);
                const baseUrl = `${urlObj.origin}${urlObj.pathname}`;
                const baseTag = `<base href="${baseUrl}">`;
                
                if (html.match(/<head>/i)) {
                    return html.replace(/<head>/i, `<head>\n    ${baseTag}`);
                } else if (html.match(/<html>/i)) {
                    return html.replace(/<html>/i, `<html>\n<head>\n    ${baseTag}\n</head>`);
                } else {
                    return baseTag + html;
                }
            } catch (err) {
                console.error("Gagal menyuntikkan base-tag:", err);
                return html;
            }
        }

        function applySyntaxColoring(raw) {
            let escaped = raw
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
            
            // Mewarnai komentar HTML
            escaped = escaped.replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="comment">$1</span>');

            // Mewarnai Tags, Atribut, dan Nilainya
            return escaped.replace(/&lt;(\/?[a-zA-Z0-9:-]+)([\s\S]*?)&gt;/g, function(match, tagName, tagBody) {
                if (match.includes('class="comment"')) return match; 

                let highlightedTagName = `&lt;<span class="tag">${tagName}</span>`;
                let highlightedBody = tagBody.replace(/(\s[a-zA-Z0-9:-]+)=("[^"]*"|'[^']*')/g, function(attrMatch, attrName, attrVal) {
                    return ` <span class="attr">${attrName.trim()}</span>=<span class="val">${attrVal}</span>`;
                });
                return highlightedTagName + highlightedBody + '&gt;';
            });
        }

        // Reset application to initial state
        function resetApp() {
            document.getElementById('terminalOverlay').classList.remove('visible');
            document.getElementById('inputCard').classList.remove('hidden');
            
            document.getElementById('urlInput').value = '';
            document.getElementById('loaderText').textContent = 'Menyelaraskan gravitasi Black Hole...';
            document.getElementById('liveFrame').removeAttribute('srcdoc');

            orion.isSucked = false;
            orion.suckProgress = 0;
            orion.opacity = 1.0;
            orion.updateCoordinates();

            scorpius.isSucked = false;
            scorpius.suckProgress = 0;
            scorpius.opacity = 1.0;
            scorpius.updateCoordinates();

            showToast('Sistem dikalibrasi ulang. Siap menghisap target baru!', 'success');
        }

        // Secure copy to clipboard with iframe/sandbox safety features
        function copyCode() {
            const codeOutput = document.getElementById('codeOutput');
            const copyBtn = document.getElementById('copyBtn');
            const codeText = codeOutput.textContent || codeOutput.innerText;

            if (!codeText) {
                showToast('Materi kosong! Tidak ada kode untuk disalin.', 'error');
                return;
            }

            let copiedSuccessfully = false;
            try {
                const helperArea = document.createElement('textarea');
                helperArea.value = codeText;
                helperArea.style.position = 'fixed';
                helperArea.style.left = '-9999px';
                document.body.appendChild(helperArea);
                helperArea.select();
                copiedSuccessfully = document.execCommand('copy');
                document.body.removeChild(helperArea);
            } catch (err) {
                copiedSuccessfully = false;
            }

            if (!copiedSuccessfully && navigator.clipboard) {
                navigator.clipboard.writeText(codeText).then(() => {
                    handleCopyTrigger(copyBtn);
                }).catch(() => {
                    showToast('Gagal menyalin. Blokade izin clipboard terdeteksi.', 'error');
                });
            } else if (copiedSuccessfully) {
                handleCopyTrigger(copyBtn);
            } else {
                showToast('Gagal menyalin kode.', 'error');
            }
        }

        function handleCopyTrigger(btn) {
            btn.innerHTML = `
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                </svg>
                Kode Tersalin!
            `;
            btn.classList.add('copied');
            showToast('Kode berhasil dimasukkan ke clipboard Anda!', 'success');
            
            setTimeout(() => {
                btn.innerHTML = `
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0-2-.9-2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                    </svg>
                    Salin Kode
                `;
                btn.classList.remove('copied');
            }, 2000);
        }
    </script>
